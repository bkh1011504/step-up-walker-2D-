plugins { id 'com.android.application' }

android {
    namespace 'com.safewalk.stepupwalker'
    compileSdk 35
    defaultConfig {
        applicationId 'com.safewalk.stepupwalker'
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName '1.0.0'
    }
    buildTypes { release { minifyEnabled false } }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
